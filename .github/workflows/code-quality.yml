name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Run flake8
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          architecture: 'x64'
          cache: 'poetry'

      - name: Install flake8
        run: |
          pipx install flake8

      - name: Run flake8
        run: |
          flake8 --max-line-length=120 .
        working-directory: ./Safaa
